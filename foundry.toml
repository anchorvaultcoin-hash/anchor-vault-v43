[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
via_ir = true
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

# remappings подхватываются из remappings.txt
fs_permissions = [{ access = "read", path = "./"}]

[fuzz]
runs = 256

[invariant]
runs = 256
depth = 50
fail_on_revert = false

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
