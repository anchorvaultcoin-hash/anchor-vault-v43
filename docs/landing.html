<style>
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--gold:#D4AF37;--gold2:#b8941e;--text:#e8e8e8;--text2:#a0a0a0;
  --border:#2a2a2a;--maxw:1100px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;line-height:1.6;overflow-x:hidden;position:relative}
a{color:var(--gold);text-decoration:none}
.container{max-width:var(--maxw);margin:0 auto;padding:0 20px;position:relative;z-index:2}

/* Coin rain canvas */
#coinRain{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:.55}

/* Header */
header{border-bottom:1px solid var(--border);padding:15px 0;position:sticky;top:0;background:rgba(15,15,15,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:50}
header .container{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo img{width:40px;height:40px;animation:float 6s ease-in-out infinite;filter:drop-shadow(0 2px 8px rgba(212,175,55,.35))}
.logo span{font-weight:700;font-size:1.1rem}
.logo span small{color:var(--gold)}
header nav{display:flex;align-items:center;gap:15px}
header nav a{padding:8px 18px;border:1px solid var(--gold);border-radius:6px;font-size:.85rem;font-weight:600;transition:.2s}
header nav a:hover{background:var(--gold);color:var(--bg)}
.lang-select{padding:8px 12px;border-radius:6px;background:var(--bg2);color:var(--text);border:1px solid var(--border);cursor:pointer;font-size:.85rem}

/* Hero */
.hero{min-height:90vh;display:flex;align-items:center;text-align:center;padding:60px 0;position:relative}
.hero::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(212,175,55,.18),transparent 70%);pointer-events:none;z-index:0}
.coin-container{width:220px;height:220px;margin:0 auto 30px;position:relative;z-index:2}
.coin-container .coin{width:100%;height:100%;object-fit:contain;animation:float 7s ease-in-out infinite;filter:drop-shadow(0 18px 38px rgba(0,0,0,.6)) drop-shadow(0 0 24px rgba(212,175,55,.35));transition:transform .4s ease}
.coin-container:hover .coin{transform:scale(1.04) rotate(-3deg)}
.hero h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;line-height:1.2;margin-bottom:15px}
.hero h1 .gold{color:var(--gold)}
.hero p{color:var(--text2);max-width:700px;margin:0 auto 25px;font-size:1.05rem}
.hero .btn{padding:14px 32px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border-radius:8px;font-weight:700;font-size:1rem;border:0;cursor:pointer;transition:.2s;display:inline-block;box-shadow:0 6px 20px rgba(212,175,55,.25)}
.hero .btn:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 10px 28px rgba(212,175,55,.4)}
.hero .compat{font-size:.8rem;color:var(--text2);margin-top:12px}

/* Sections */
section{padding:70px 0;position:relative;z-index:2}
section h2{text-align:center;font-size:2rem;margin-bottom:50px}
section h2 .gold{color:var(--gold)}
.grid{display:grid;gap:25px}
.grid3{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.grid4{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.card{background:rgba(26,26,26,.85);border:1px solid var(--border);border-radius:12px;padding:30px 25px;transition:.2s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.card:hover{border-color:var(--gold);transform:translateY(-2px)}
.card .icon{width:50px;height:50px;border-radius:10px;background:rgba(212,175,55,.1);display:flex;align-items:center;justify-content:center;margin-bottom:15px;font-size:1.5rem}
.card h3{font-size:1.1rem;margin-bottom:8px}
.card p{color:var(--text2);font-size:.9rem}
.step-num{font-size:4rem;font-weight:900;color:rgba(212,175,55,.15);position:absolute;top:15px;right:20px}
.stat{text-align:center;padding:25px}
.stat .num{font-size:2.5rem;font-weight:800;color:var(--gold)}
.stat .label{color:var(--text2);font-size:.85rem;margin-top:5px}

/* CTA */
.cta{background:linear-gradient(180deg,transparent,rgba(212,175,55,.08),transparent);text-align:center}
.cta .btn{padding:16px 36px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border-radius:8px;font-weight:700;font-size:1.1rem;border:0;cursor:pointer;display:inline-block;margin-top:20px;box-shadow:0 6px 20px rgba(212,175,55,.3)}
.cta .btn:hover{filter:brightness(1.1);transform:translateY(-2px)}
.cta .footnote{font-size:.8rem;color:var(--text2);margin-top:15px}

/* Footer */
footer{border-top:1px solid var(--border);padding:25px 0;text-align:center;color:var(--text2);font-size:.8rem;position:relative;z-index:2;background:rgba(15,15,15,.85)}

/* Animations */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  .logo img,.coin-container .coin{animation:none}
  #coinRain{display:none}
}

/* Mobile */
@media(max-width:768px){
  header .container{flex-direction:column}
  .hero{min-height:70vh;padding:40px 0}
  .coin-container{width:160px;height:160px}
  section{padding:40px 0}
  section h2{font-size:1.5rem;margin-bottom:30px}
  #coinRain{opacity:.35}
}
</style>

      who1:"巨鲸", who1desc:"保护大额余额免受单点故障影响。",

  };

  // Безопасная установка текста с золотым акцентом — без innerHTML
  function setGoldHeading(id, plain, accent){
    const el = document.getElementById(id);
    if(!el) return;
    el.replaceChildren();
    if(plain) el.appendChild(document.createTextNode(plain));
    const span = document.createElement('span');
    span.className = 'gold';
    span.textContent = accent;
    el.appendChild(span);
  }
  function setText(id, txt){
    const el = document.getElementById(id);
    if(el) el.textContent = txt;
  }

  function applyLang(code){
    const t = LANG[code];
    if(!t) return;
    document.documentElement.lang = code === 'zh' ? 'zh' : (code === 'en' ? 'en' : 'ru');

    setGoldHeading('heroTitle', t.heroTitle1 + ' ', t.heroTitle2);
    setText('heroDesc', t.heroDesc);
    setText('heroBtn', t.heroBtn);

    setGoldHeading('howTitle', t.howTitle1, t.howTitle2);
    setText('step1Title', t.step1Title); setText('step1Desc', t.step1Desc);
    setText('step2Title', t.step2Title); setText('step2Desc', t.step2Desc);
    setText('step3Title', t.step3Title); setText('step3Desc', t.step3Desc);

    setText('featuresTitle', t.featuresTitle);
    setText('feat1Title', t.feat1Title); setText('feat1Desc', t.feat1Desc);
    setText('feat2Title', t.feat2Title); setText('feat2Desc', t.feat2Desc);
    setText('feat3Title', t.feat3Title); setText('feat3Desc', t.feat3Desc);
    setText('feat4Title', t.feat4Title); setText('feat4Desc', t.feat4Desc);

    setGoldHeading('whoTitle', t.whoTitle1, t.whoTitle2);
    setText('whoDesc', t.whoDesc);
    setText('who1', t.who1); setText('who1desc', t.who1desc);
    setText('who2', t.who2); setText('who2desc', t.who2desc);
    setText('who3', t.who3); setText('who3desc', t.who3desc);

    setGoldHeading('secTitle', t.secTitle1, t.secTitle2);
    setText('sec1', t.sec1); setText('sec2', t.sec2);
    setText('sec3', t.sec3); setText('sec4', t.sec4);

    setText('ctaTitle', t.ctaTitle);
    setText('ctaDesc', t.ctaDesc);
    setText('ctaBtn', t.ctaBtn);
    setText('ctaFootnote', t.ctaFootnote);
  }

  const langSelect = document.getElementById('langSelect');
  langSelect.addEventListener('change', function(){
    const v = this.value;
    if(Object.prototype.hasOwnProperty.call(LANG, v)) applyLang(v);
  });

  // Стартовый язык — определяем по браузеру, fallback ru
  const navLang = (navigator.language || 'ru').toLowerCase().slice(0,2);
  const startLang = Object.prototype.hasOwnProperty.call(LANG, navLang) ? navLang : 'ru';
  langSelect.value = startLang;
  applyLang(startLang);

  // ===== Падающие монеты на canvas =====
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduced) return; // не запускаем анимацию

  const canvas = document.getElementById('coinRain');
  if(!canvas || !canvas.getContext) return;
  const ctx = canvas.getContext('2d', { alpha: true });

  const coinImg = new Image();
  coinImg.decoding = 'async';
  // Маленькая монета встроена тем же base64
  coinImg.src = document.querySelector('.logo img').src;

  let W = 0, H = 0, dpr = 1, coins = [];
  let running = true, lastT = 0, raf = 0;

  function isMobile(){ return window.innerWidth < 768; }

  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function spawnCoin(initial){
    const size = 18 + Math.random() * 26; // 18..44 px
    return {
      x: Math.random() * W,
      y: initial ? Math.random() * H : -size - Math.random() * 200,
      size: size,
      vy: 25 + Math.random() * 55,       // px/sec
      vx: (Math.random() - 0.5) * 20,
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 1.2,    // rad/sec
      alpha: 0.35 + Math.random() * 0.35
    };
  }

  function initCoins(){
    const count = isMobile() ? 7 : 14;
    coins = [];
    for(let i = 0; i < count; i++) coins.push(spawnCoin(true));
  }

  function tick(t){
    if(!running){ raf = 0; return; }
    if(!lastT) lastT = t;
    let dt = (t - lastT) / 1000;
    lastT = t;
    if(dt > 0.1) dt = 0.1; // защита от больших скачков (фон/lag)

    ctx.clearRect(0, 0, W, H);

    if(coinImg.complete && coinImg.naturalWidth > 0){
      for(let i = 0; i < coins.length; i++){
        const c = coins[i];
        c.y += c.vy * dt;
        c.x += c.vx * dt;
        c.rot += c.vr * dt;
        if(c.y - c.size > H){
          coins[i] = spawnCoin(false);
          continue;
        }
        ctx.save();
        ctx.globalAlpha = c.alpha;
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rot);
        ctx.drawImage(coinImg, -c.size/2, -c.size/2, c.size, c.size);
        ctx.restore();
      }
    }

    raf = requestAnimationFrame(tick);
  }

  function start(){
    if(raf) return;
    lastT = 0;
    running = true;
    raf = requestAnimationFrame(tick);
  }
  function stop(){
    running = false;
    if(raf){ cancelAnimationFrame(raf); raf = 0; }
  }

  // Resize с throttle
  let resizeTm = 0;
  window.addEventListener('resize', function(){
    clearTimeout(resizeTm);
    resizeTm = setTimeout(function(){
      resize();
      initCoins();
    }, 150);
  }, { passive: true });

  // Пауза при скрытии вкладки
  document.addEventListener('visibilitychange', function(){
    if(document.hidden) stop(); else start();
  });

  function launch(){
    resize();
    initCoins();
    start();
  }

  if(coinImg.complete && coinImg.naturalWidth > 0){
    launch();
  } else {
    coinImg.addEventListener('load', launch, { once: true });
    coinImg.addEventListener('error', function(){ /* тихо игнорим — лендинг работает без анимации */ }, { once: true });
  }
})();
